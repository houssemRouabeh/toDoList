name: Executer les actions du rapport

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup gh auth
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 80"
          prompt: |
            Tu es un assistant qui execute des taches sur des repos GitHub.
            Tu as acces a la commande `gh` pour interagir avec GitHub.

            ETAPE 1 — Lis le fichier RAPPORT.md :
            Bash("cat /home/runner/work/_claude-manager/_claude-manager/RAPPORT.md")

            ETAPE 2 — Pour chaque action [x] trouvee dans le rapport,
            identifie le repo (section ## NOM_REPO) et execute :

            Pour un .gitignore manquant sur REPO :
            Bash("gh repo clone houssemRouabeh/REPO /tmp/REPO && cd /tmp/REPO && echo 'node_modules/\n.env\n.env.local\ndist/\nbuild/\n*.log' > .gitignore && git add .gitignore && git checkout -b claude/add-gitignore && git commit -m 'chore(claude): add .gitignore' && gh pr create --title 'chore(claude): add .gitignore' --body 'Ajout du fichier .gitignore manquant' --base main")

            Pour un README manquant ou a ameliorer sur REPO :
            Bash("gh repo clone houssemRouabeh/REPO /tmp/REPO2 && cd /tmp/REPO2 && cat package.json 2>/dev/null || cat composer.json 2>/dev/null")
            Puis cree un README.md professionnel et :
            Bash("cd /tmp/REPO2 && git checkout -b claude/readme && git add README.md && git commit -m 'docs(claude): add professional README' && gh pr create --title 'docs(claude): add professional README' --body 'README professionnel genere automatiquement'")

            ETAPE 3 — Pour chaque repo du rapport, genere un README.md
            professionnel meme si non marque [x], avec ces sections :
            - Description
            - Fonctionnalites
            - Stack technique
            - Installation
            - Configuration
            - Utilisation

            ETAPE 4 — Mets a jour RAPPORT.md avec les PRs creees :
            Bash("cd /home/runner/work/_claude-manager/_claude-manager && sed -i 's/\[x\] /[FAIT] /g' RAPPORT.md && git add RAPPORT.md && git commit -m 'chore: mark executed actions in rapport' && git push origin HEAD")

            IMPORTANT :
            - Utilise uniquement des commandes Bash avec gh et git
            - Pour chaque PR, verifie si la branche existe deja avant
            - Si gh pr create echoue car la branche existe, continue
            - Le token gh est deja configure, pas besoin de login
