name: Executer les actions du rapport

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup gh auth
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Setup git
        run: |
          git config --global user.email "claude-bot@github.com"
          git config --global user.name "claude[bot]"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 80"
          prompt: |
            Le fichier RAPPORT.md se trouve ici :
            /home/runner/work/_claude-manager/_claude-manager/RAPPORT.md

            Lis-le d abord avec :
            cat /home/runner/work/_claude-manager/_claude-manager/RAPPORT.md

            Ce fichier contient une liste de repos GitHub avec des actions.
            Les actions marquees [x] sont a executer.
            Les actions marquees [ ] ou [~] sont a ignorer.

            Pour chaque section ## NOM_REPO du fichier :

            1. Note le nom exact du repo (ex: "e-shop", "Job-Board", "toDoList")

            2. Pour chaque action [x] dans cette section :
               - Clone le repo dans /tmp/NOM_REPO
               - Cree une branche claude/action-NOM_REPO
               - Applique le changement demande
               - Cree une PR vers la branche principale

            3. Apres toutes les actions, genere aussi un README.md
               professionnel pour chaque repo et cree une PR separee

            Les commandes disponibles sont gh et git.
            Le token gh est deja configure.
            Travaille repo par repo, un a la fois.
            Commence par e-shop (SECURITE CRITIQUE).
