name: Sync documentation

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.claude_code_oauth_token }}
          prompt: |
            Regarde les commits des dernieres 24h avec git log.
            Si des fichiers de code (.js, .php, .ts) ont change
            sans mise a jour correspondante dans la doc :

            1. Mets a jour README.md ou les fichiers dans docs/
            2. Commite : "docs: sync with recent changes"
            3. Si les changements sont importants, ouvre une PR
               nommee "docs: automated sync"

            Ne touche QU aux fichiers .md.
            Si rien n a change dans le code aujourd hui, ne fais rien.
