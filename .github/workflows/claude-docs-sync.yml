name: Sync documentation

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Regarde les commits des dernières 24h avec git log.
            Si des fichiers de code (.js, .php, .ts) ont changé
            sans mise à jour correspondante dans la doc :

            1. Mets à jour README.md ou les fichiers dans docs/
            2. Commite : "docs: sync with $(date +%Y-%m-%d) changes"
            3. Si les changements sont importants, ouvre une PR
               nommée "docs: automated sync $(date +%Y-%m-%d)"

            Ne touche QU'aux fichiers .md.
            Si rien n'a changé dans le code aujourd'hui, ne fais rien.
          claude_args: "--allowedTools Edit(**.md),Bash(git log*),Bash(git diff*),Bash(git add*),Bash(git commit*)"
