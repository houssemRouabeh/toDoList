name: Rapport global de tous les repos

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  id-token: write

jobs:
  rapport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools mcp__github__list_repositories,mcp__github__get_repository,mcp__github__list_issues,mcp__github__get_file_contents,mcp__github__list_repository_contents,Read,Write,Edit,Bash(git*),Bash(find*),Bash(cat*),Bash(ls*) --max-turns 50"
          prompt: |
            Tu es un auditeur technique senior.

            ETAPE 1 - Liste tous les repos de houssemRouabeh via l API GitHub
            en utilisant mcp__github__list_repositories.

            ETAPE 2 - Pour chaque repo (ignore _claude-manager),
            utilise mcp__github__get_file_contents pour lire :
            - README.md
            - package.json ou composer.json si present
            - La liste des fichiers a la racine

            ETAPE 3 - Ecris le fichier RAPPORT.md directement
            dans le dossier courant avec la commande :
            Write("RAPPORT.md", contenu_complet)

            Structure OBLIGATOIRE du fichier :

            # Rapport audit global — $(date +%d/%m/%Y)

            ## Legende
            - [ ] action proposee (remplacer par [x] pour confirmer)
            - [~] action a ignorer

            ---

            ## NOM_REPO

            **Description** : ce que fait le projet
            **Stack** : technologies detectees
            **Derniere activite** : date
            **Etat** : Actif / Maintenance / Abandon / Vide

            ### Actions proposees
            - [ ] SECURITE : description precise
            - [ ] DEPS : mettre a jour X de vX vers vY
            - [ ] DOCS : description precise
            - [ ] REFACTO : description precise
            - [ ] TESTS : description precise

            ---

            (repeter pour chaque repo)

            ---

            ## Recapitulatif

            | Repo | Etat | Nb actions |
            |------|------|-----------|
            | x | x | x |

            IMPORTANT : Le fichier RAPPORT.md DOIT etre cree
            avec la commande Write dans le repertoire courant.
            C est la tache la plus importante.
